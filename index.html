<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student | SeGo Carpool</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #f59e0b; --slate: #94a3b8; --green: #22c55e; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .booking-card { border-left-color: var(--amber); background: rgba(245, 158, 11, 0.05); border: 1px solid var(--amber); }
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        
        /* Chat Styles */
        #chatBox { background: rgba(15, 23, 42, 0.8); border-radius: 10px; height: 180px; overflow-y: auto; padding: 10px; margin: 15px 0; border: 1px solid #334155; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; }
        .msg.me { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #475569; color: white; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }

        /* Rating Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; border: 1px solid var(--amber); }
        .stars { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .star-btn { background: none; border: none; font-size: 35px; cursor: pointer; color: #334155; transition: 0.2s; }
        .star-btn.active { color: var(--amber); }
        .feedback-input { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center; margin-bottom: 5px;">🚗 SeGo</h1>
        <p style="text-align: center; color: var(--slate); margin-bottom: 30px;">Student Portal</p>
        <div id="list">Connecting to SeGo services...</div>
    </div>

    <div id="ratingModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--amber); margin:0;">Rate Your Trip</h2>
            <p style="color:var(--slate); font-size:0.9rem;">How was your ride with the driver?</p>
            <div class="stars" id="starContainer">
                <button class="star-btn" onclick="setRating(1)">★</button>
                <button class="star-btn" onclick="setRating(2)">★</button>
                <button class="star-btn" onclick="setRating(3)">★</button>
                <button class="star-btn" onclick="setRating(4)">★</button>
                <button class="star-btn" onclick="setRating(5)">★</button>
            </div>
            <textarea id="feedbackText" class="feedback-input" rows="3" placeholder="Any comments? (Optional)"></textarea>
            <button class="btn" style="background:var(--amber)" onclick="submitRating()">Submit Review</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedStars = 0;
        let currentRatingDriverId = "";

        db.ref('drivers').on('value', (snapshot) => {
            const data = snapshot.val();
            let myBookedId = localStorage.getItem('booked_driver_id');
            let html = "";

            if (data) {
                const driversArray = Object.values(data);
                const activeTrip = driversArray.find(d => d.id === myBookedId && d.status === 'BOOKED');

                if (activeTrip) {
                    localStorage.setItem('pending_rating_id', activeTrip.id);
                    html = `
                        <div class="card booking-card">
                            <h2 style="color:var(--amber); margin-top:0;">Trip Confirmed</h2>
                            <p style="margin:0;">Driver: <b>${activeTrip.name}</b></p>
                            <p style="margin:5px 0; font-size:0.9rem; color:var(--slate);">${activeTrip.car} • ${activeTrip.plate}</p>
                            <div id="chatBox"></div>
                            <div class="chat-input-area">
                                <input type="text" id="chatInput" placeholder="Message driver...">
                                <button onclick="sendChat('${activeTrip.id}')" style="padding:10px 15px; background:var(--blue); border:none; border-radius:8px; color:white; font-weight:bold;">Send</button>
                            </div>
                            <button class="btn" style="background:#475569; margin-top:20px;" onclick="finishTrip('${activeTrip.id}')">FINISH TRIP</button>
                        </div>`;
                    loadChats(activeTrip.id);
                } else {
                    localStorage.removeItem('booked_driver_id');
                    const lastId = localStorage.getItem('pending_rating_id');
                    if(lastId) {
                        askForRating(lastId);
                        localStorage.removeItem('pending_rating_id');
                    }

                    const online = driversArray.filter(d => d.status === 'ON');
                    if(online.length > 0) {
                        online.forEach(d => {
                            html += `
                                <div class="card">
                                    <h3>${d.name}</h3>
                                    <p style="color:var(--slate);">${d.car} [${d.plate}]</p>
                                    <div style="display:flex; gap:10px;">
                                        <button class="btn" style="flex:2" onclick="book('${d.id}')">BOOK NOW</button>
                                        <button onclick="showDriverInfo('${d.id}')" style="flex:1; background:#475569; color:white; border:none; border-radius:10px; cursor:pointer;">INFO</button>
                                    </div>
                                </div>`;
                        });
                    } else {
                        html = "<div style='text-align:center; padding-top:50px; color:var(--slate);'><h3>No drivers online</h3><p>Try again later.</p></div>";
                    }
                }
            }
            document.getElementById('list').innerHTML = html;
        });

        // Booking & Chat Logic
        async function book(id) {
            if(!confirm("Book this driver?")) return;
            localStorage.setItem('booked_driver_id', id);
            await db.ref('drivers/' + id).update({ status: 'BOOKED', msg: 'New Booking!' });
        }

        async function sendChat(driverId) {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            await db.ref('chats/' + driverId).push({ sender: 'student', text: input.value, time: Date.now() });
            input.value = "";
        }

        function loadChats(driverId) {
            db.ref('chats/' + driverId).on('value', (snap) => {
                const chatBox = document.getElementById('chatBox');
                if(!chatBox) return;
                let chatHtml = "";
                snap.forEach(child => {
                    const m = child.val();
                    const side = m.sender === 'student' ? 'me' : 'them';
                    chatHtml += `<div class="msg ${side}">${m.text}</div>`;
                });
                chatBox.innerHTML = chatHtml;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Trip End & Rating Modal Logic
        async function finishTrip(id) {
            if(confirm("End this trip? History will be cleared.")) {
                localStorage.setItem('pending_rating_id', id);
                await db.ref('chats/' + id).remove();
                localStorage.removeItem('booked_driver_id');
                // The listener above will automatically trigger askForRating()
            }
        }

        function showDriverInfo(id) {
            db.ref('drivers/' + id).once('value').then(s => {
                const d = s.val();
                const profile = `Driver: ${d.name}\nPhone: ${d.phone || 'N/A'}\nRating: ⭐ ${d.rating || 'New'}\nTrips: ${d.total_trips || '0'}`;
                if(confirm(profile + "\n\nContact via WhatsApp?")) {
                    if(d.phone) window.open(`https://wa.me/6${d.phone}`, '_blank');
                    else alert("No phone number found.");
                }
            });
        }

        function askForRating(driverId) {
            currentRatingDriverId = driverId;
            document.getElementById('ratingModal').style.display = 'flex';
        }

        function setRating(n) {
            selectedStars = n;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => {
                s.classList.toggle('active', i < n);
            });
        }

        async function submitRating() {
            if(selectedStars === 0) return alert("Please select a rating!");
            const feedback = document.getElementById('feedbackText').value;
            await db.ref('ratings/' + currentRatingDriverId).push({
                stars: selectedStars,
                message: feedback,
                time: Date.now()
            });
            alert("Thank you for your feedback!");
            document.getElementById('ratingModal').style.display = 'none';
            location.reload();
        }
    </script>
</body>
</html>
