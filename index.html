<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --blue: #3b82f6; 
            --amber: #fbbc04; 
            --slate: #94a3b8; 
            --white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--white); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        .container { width: 100%; max-width: 450px; }

        /* Card Styles */
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .input-field { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box; 
        }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background: var(--blue); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        /* Tabs */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            flex: 1; 
            padding: 12px; 
            text-align: center; 
            background: #1e293b; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            border: 1px solid #334155; 
        }
        .tab.active { background: var(--blue); border-color: var(--blue); font-weight: bold; }

        /* Booking Items */
        .booking-item { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-left: 4px solid var(--slate);
        }

        .status-pill { 
            padding: 4px 10px; 
            border-radius: 5px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .pending { background: #475569; }
        .accepted { background: #22c55e; }

        /* Chat */
        #chatBox { 
            height: 150px; 
            overflow-y: auto; 
            background: #0f172a; 
            padding: 10px; 
            border-radius: 10px; 
            margin: 10px 0; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 0.85rem; }
        .msg.me { align-self: flex-end; background: var(--blue); }
        .msg.them { align-self: flex-start; background: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1 style="text-align: center; font-size: 2.5rem;">🚗 SeGo</h1>
            <p style="text-align: center; color: var(--slate);">UiTM Carpool Portal</p>
            <div class="card">
                <input type="text" id="stuID" class="input-field" placeholder="Student ID (e.g. 2023...)">
                <input type="text" id="stuName" class="input-field" placeholder="Full Name">
                <button class="btn" onclick="login()">Login</button>
            </div>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span>Welcome, <b id="displayStuName"></b></span>
                <button onclick="logout()" style="background:none; border:none; color:var(--slate); cursor:pointer;">LOGOUT</button>
            </div>

            <div class="tab-bar">
                <div class="tab active" id="tabInstant" onclick="switchTab('instant')">Instant Ride</div>
                <div class="tab" id="tabBooking" onclick="switchTab('booking')">Pre-Book</div>
            </div>

            <div id="instantSection">
                <div id="driverList">Searching for drivers...</div>
            </div>

            <div id="bookingSection" style="display: none;">
                <div class="card" style="border-top: 4px solid var(--amber);">
                    <h4 style="margin-top: 0;">Schedule a Trip</h4>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <input type="text" id="bookDest" class="input-field" placeholder="Where to? (e.g. KTM Puncak)">
                    <button class="btn" style="background: var(--amber); color: black;" onclick="submitBooking()">Request Pre-Book</button>
                </div>
                <h3>My Bookings</h3>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCU3QzjiDpL4U3825XtERth6PFlJ1tsZtg",
            authDomain: "carpool-uitm.firebaseapp.com",
            databaseURL: "https://carpool-uitm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carpool-uitm",
            storageBucket: "carpool-uitm.firebasestorage.app",
            messagingSenderId: "571429884753",
            appId: "1:571429884753:web:a02c09a1818a09b77b3970"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = JSON.parse(localStorage.getItem('sego_user'));

        // LOGIN LOGIC
        function login() {
            const id = document.getElementById('stuID').value.trim();
            const name = document.getElementById('stuName').value.trim();
            if(!id || !name) return alert("Please fill in all fields");
            currentUser = { id, name };
            localStorage.setItem('sego_user', JSON.stringify(currentUser));
            location.reload();
        }

        function logout() {
            localStorage.removeItem('sego_user');
            location.reload();
        }

        if(currentUser) {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('displayStuName').innerText = currentUser.name;
            syncData();
        }

        function switchTab(type) {
            document.getElementById('instantSection').style.display = type === 'instant' ? 'block' : 'none';
            document.getElementById('bookingSection').style.display = type === 'booking' ? 'block' : 'none';
            document.getElementById('tabInstant').className = type === 'instant' ? 'tab active' : 'tab';
            document.getElementById('tabBooking').className = type === 'booking' ? 'tab active' : 'tab';
        }

        // DATA SYNC
        function syncData() {
            // 1. DRIVER LIST (With Undefined Filter)
            db.ref('drivers').on('value', (snapshot) => {
                const data = snapshot.val();
                let html = "";
                let myBookedId = localStorage.getItem('booked_driver_id');

                if (data) {
                    // THE FIX: Filter out nulls and incomplete data objects
                    const drivers = Object.values(data).filter(d => d && typeof d === 'object' && d.name && d.car);

                    const activeTrip = drivers.find(d => d.id === myBookedId && d.status === 'BOOKED');

                    if (activeTrip) {
                        html = `
                        <div class="card" style="border-left: 5px solid var(--amber);">
                            <h3 style="color:var(--amber); margin:0;">Ongoing Trip</h3>
                            <p>Driver: <b>${activeTrip.name}</b> (${activeTrip.car})</p>
                            <div id="chatBox"></div>
                            <input type="text" id="chatInput" class="input-field" placeholder="Message driver...">
                            <button class="btn" style="background:#475569; margin-top:10px;" onclick="finishTrip('${activeTrip.id}')">FINISH TRIP</button>
                        </div>`;
                        loadChats(activeTrip.id);
                    } else {
                        localStorage.removeItem('booked_driver_id');
                        drivers.forEach(d => {
                            if (d.status === "ON") {
                                html += `
                                <div class="card">
                                    <div style="font-weight:bold; font-size:1.1rem;">${d.name}</div>
                                    <div style="color:var(--slate); font-size:0.85rem; margin-bottom:12px;">${d.car} • [${d.plate || 'N/A'}]</div>
                                    <div style="display:flex; gap:10px;">
                                        <button class="btn" onclick="bookNow('${d.id}')">BOOK NOW</button>
                                        <button class="btn" style="background:#475569" onclick="alert('Rating: '+ (d.rating || 5))">INFO</button>
                                    </div>
                                </div>`;
                            }
                        });
                    }
                }
                document.getElementById('driverList').innerHTML = html || "<p style='text-align:center; color:var(--slate); margin-top:50px;'>No drivers online.</p>";
            });

            // 2. MY PRE-BOOKINGS
            db.ref('bookings').on('value', snap => {
                let html = "";
                snap.forEach(child => {
                    const b = child.val();
                    if(b.student_id === currentUser.id) {
                        html += `
                        <div class="booking-item">
                            <div>
                                <b>${b.date} • ${b.time}</b><br>
                                <small>To: ${b.dest}</small>
                            </div>
                            <span class="status-pill ${b.status.toLowerCase()}">${b.status}</span>
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = html || "<p style='color:var(--slate)'>No history.</p>";
            });
        }

        // ACTIONS
        async function bookNow(id) {
            if(!confirm("Book this driver?")) return;
            localStorage.setItem('booked_driver_id', id);
            await db.ref('drivers/' + id).update({ status: 'BOOKED' });
        }

        async function finishTrip(id) {
            if(confirm("End trip?")) {
                await db.ref('chats/' + id).remove();
                await db.ref('drivers/' + id).update({ status: 'ON' });
                localStorage.removeItem('booked_driver_id');
            }
        }

        async function submitBooking() {
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const dest = document.getElementById('bookDest').value;
            if(!date || !time || !dest) return alert("Fill all details");
            
            await db.ref('bookings').push({
                student_id: currentUser.id,
                student_name: currentUser.name,
                date, time, dest,
                status: 'PENDING'
            });
            alert("Booking request sent!");
        }

        function loadChats(id) {
            db.ref('chats/'+id).on('value', s => {
                let h = ""; s.forEach(m => { h += `<div class="msg ${m.val().sender==='student'?'me':'them'}">${m.val().text}</div>`; });
                const box = document.getElementById('chatBox');
                if(box) { box.innerHTML = h; box.scrollTop = box.scrollHeight; }
            });
            // Send chat on Enter key
            document.body.onkeypress = function(e) {
                if(e.key === 'Enter' && document.activeElement.id === 'chatInput') {
                    const val = document.getElementById('chatInput').value;
                    if(val) {
                        db.ref('chats/'+id).push({sender:'student', text:val});
                        document.getElementById('chatInput').value = "";
                    }
                }
            }
        }
    </script>
</body>
</html>
