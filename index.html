<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeGo | Student Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --blue: #3b82f6; --amber: #fbbc04; --slate: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #334155; }
        
        /* Login Area */
        #loginArea { text-align: center; margin-top: 50px; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #1e293b; border-radius: 10px; cursor: pointer; font-size: 0.9rem; border: 1px solid #334155; }
        .tab.active { background: var(--blue); border-color: var(--blue); }

        /* Booking List */
        .booking-item { border-bottom: 1px solid #334155; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .pending { background: #5f6368; }
        .accepted { background: #22c55e; }

        /* Existing Styles for Chat & Stars from previous session apply here... */
        #chatBox { height: 150px; overflow-y: auto; background: #0f172a; padding: 10px; border-radius: 10px; margin: 10px 0; display: flex; flex-direction: column; gap: 5px; }
        .msg { padding: 8px; border-radius: 8px; max-width: 80%; font-size: 0.85rem; }
        .msg.me { align-self: flex-end; background: var(--blue); }
        .msg.them { align-self: flex-start; background: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginArea">
            <h1>🚗 SeGo</h1>
            <p>Enter your Student ID to start</p>
            <input type="text" id="stuID" class="input-field" placeholder="Student ID (e.g. 2023xxx)">
            <input type="text" id="stuName" class="input-field" placeholder="Full Name">
            <button class="btn" onclick="login()">Login</button>
        </div>

        <div id="mainApp" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Hello, <span id="displayStuName"></span></h3>
                <button onclick="logout()" style="background:none; border:none; color:var(--slate); cursor:pointer;">Logout</button>
            </div>

            <div class="tab-bar">
                <div class="tab active" id="tabInstant" onclick="switchTab('instant')">Instant Ride</div>
                <div class="tab" id="tabBooking" onclick="switchTab('booking')">Pre-Book</div>
            </div>

            <div id="instantSection">
                <div id="driverList">Searching for drivers...</div>
            </div>

            <div id="bookingSection" style="display: none;">
                <div class="card">
                    <h4>New Booking</h4>
                    <input type="date" id="bookDate" class="input-field">
                    <input type="time" id="bookTime" class="input-field">
                    <input type="text" id="bookDest" class="input-field" placeholder="Destination">
                    <button class="btn" style="background:var(--amber); color:black;" onclick="submitBooking()">Request Booking</button>
                </div>
                <h4>My Bookings</h4>
                <div id="myBookingsList"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Your Config Here */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        function login() {
            const id = document.getElementById('stuID').value;
            const name = document.getElementById('stuName').value;
            if(!id || !name) return alert("Fill in details!");
            currentUser = { id, name };
            localStorage.setItem('sego_user', JSON.stringify(currentUser));
            showApp();
        }

        function logout() {
            localStorage.removeItem('sego_user');
            location.reload();
        }

        function showApp() {
            const saved = localStorage.getItem('sego_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('displayStuName').innerText = currentUser.name;
                loadInstantDrivers();
                loadMyBookings();
            }
        }

        function switchTab(type) {
            document.getElementById('instantSection').style.display = type === 'instant' ? 'block' : 'none';
            document.getElementById('bookingSection').style.display = type === 'booking' ? 'block' : 'none';
            document.getElementById('tabInstant').className = type === 'instant' ? 'tab active' : 'tab';
            document.getElementById('tabBooking').className = type === 'booking' ? 'tab active' : 'tab';
        }

        // PRE-BOOK LOGIC
        async function submitBooking() {
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const dest = document.getElementById('bookDest').value;
            if(!date || !time || !dest) return alert("Fill all fields!");

            const newBooking = {
                student_id: currentUser.id,
                student_name: currentUser.name,
                date, time, dest,
                status: "PENDING",
                driver_name: ""
            };
            await db.ref('bookings').push(newBooking);
            alert("Booking submitted! Wait for a driver to accept.");
        }

        function loadMyBookings() {
            db.ref('bookings').on('value', (snap) => {
                let html = "";
                snap.forEach(child => {
                    const b = child.val();
                    if(b.student_id === currentUser.id) {
                        html += `
                        <div class="booking-item">
                            <div>
                                <div style="font-weight:bold">${b.date} @ ${b.time}</div>
                                <div style="font-size:0.8rem; color:var(--slate)">To: ${b.dest}</div>
                                <div style="font-size:0.8rem; color:var(--blue)">${b.driver_name ? 'Driver: '+b.driver_name : 'Waiting...'}</div>
                            </div>
                            <span class="status-pill ${b.status.toLowerCase()}">${b.status}</span>
                        </div>`;
                    }
                });
                document.getElementById('myBookingsList').innerHTML = html || "No bookings found.";
            });
        }

        // (Include loadInstantDrivers, book, sendChat functions from previous code here)
        showApp();
    </script>
</body>
</html>
